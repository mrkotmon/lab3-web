

#  Метаданные проекта 
project.name        = lab3
project.version     = 1.0
# Запускаемый класс, который будет прописан в Main-Class манифеста.
# В проекте нет точки входа (это веб-приложение), поэтому указан класс
# с бизнес-логикой. При необходимости поменяйте на свой класс с main().
main.class = utils.Main

# Каталоги с исходным кодом 
src.dir             = src/main/java
test.src.dir        = src/test/java
# Каталог с jar-зависимостями проекта (Maven-зависимости + JUnit).
lib.dir             = lib

#Каталоги результатов сборки 
build.dir           = build
classes.dir         = ${build.dir}/classes
test.classes.dir    = ${build.dir}/test-classes
jar.dir             = ${build.dir}/jar
reports.dir         = ${build.dir}/reports

# Итоговый артефакт 
jar.file            = ${jar.dir}/${project.name}-${project.version}.jar

#Параметры компиляции
# Версия Java для байт-кода. На JDK 8 используется пара source/target
# (флаг --release/атрибут release появился только в JDK 9).
java.source         = 1.8
java.target         = 1.8
build.encoding      = UTF-8
build.debug         = true

# Ресурсы локализация (native2ascii)
resources.dir       = src/main/resources
# Каталог с исходными файлами локализации (UTF-8).
i18n.src.dir        = ${resources.dir}/i18n
# Каталог, куда кладутся ASCII-копии после native2ascii.
i18n.dest.dir       = ${build.dir}/i18n
i18n.encoding       = UTF-8

# азвёртывание по SCP 
# Сервер, на который перемещается собранный артефакт.
scp.host            = helios.cs.ifmo.ru
scp.port            = 2222
scp.user            = s406672
scp.remote.dir      = .
scp.artifact        = ${jar.file}

# Subversion (цели diff и history)
svn.executable      = svn
svn.commit.message  = Auto-commit from Ant build
# Регулярное выражение с именами «защищённых» классов: если в рабочей
# копии изменён хотя бы один из них, цель diff НЕ выполняет commit.
protected.classes.pattern = (HitChecker|DatabaseUtil)\\.java
# Файл-отчёт цели history: diff первой несобираемой ревизии.
history.diff.file   = ${build.dir}/history-diff.txt
